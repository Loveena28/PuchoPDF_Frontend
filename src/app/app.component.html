<div class="app-container">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">📄</span>
      <span class="logo-text">पूछोPDF</span>
    </div>
    <!-- <span class="header-tag">RAG + Gemini AI</span> -->
  </header>

  <!-- Upload Screen -->
  <app-upload *ngIf="!uploadedDocument" (documentUploaded)="onDocumentUploaded($event)">
  </app-upload>

  <!-- Chat Screen -->
  <app-chat *ngIf="uploadedDocument" [document]="uploadedDocument" (newDocument)="onNewDocument()">
  </app-chat>
</div>
